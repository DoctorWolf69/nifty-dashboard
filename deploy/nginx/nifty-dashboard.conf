# Reverse proxy for the NIFTY dashboard.
# Replace your-domain.example with your real domain, then run certbot to add TLS:
#   sudo certbot --nginx -d your-domain.example
# TLS is required so the Kite redirect URL (https://your-domain/kite/callback) works.

server {
    listen 80;
    server_name your-domain.example;

    # Static EOD reports — served straight off disk so they are reachable any
    # hour, even when the dashboard service is stopped (it only runs 09:10-16:05).
    # /reports/report_latest.html = newest day; autoindex lets you browse dates.
    location /reports/ {
        alias /opt/nifty-dashboard/journal/;
        autoindex on;
    }

    # Always-on replay + backtest service (port 8090), independent of the live
    # dashboard's market-hours lifecycle. Open /replay any time.
    location ^~ /replay {
        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 600s;        # first build of a day replays the whole session
    }
    location ^~ /api/replay {
        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 600s;
    }

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 120s;

        # Off-hours: the dashboard is stopped 16:05-08:00 IST, so 8080 refuses
        # the connection. Serve a friendly page instead of a raw 502.
        proxy_intercept_errors on;
        error_page 502 504 /desk-closed.html;
    }

    # Static off-hours page, served from the repo (pulled with the code).
    location = /desk-closed.html {
        root /opt/nifty-dashboard/deploy/nginx;
        internal;
    }
}
