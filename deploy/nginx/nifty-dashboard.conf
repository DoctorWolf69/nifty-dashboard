# Reverse proxy for the NIFTY dashboard.
# Replace your-domain.example with your real domain, then run certbot to add TLS:
#   sudo certbot --nginx -d your-domain.example
# TLS is required so the Kite redirect URL (https://your-domain/kite/callback) works.

server {
    listen 80;
    server_name your-domain.example;

    # Static EOD reports — served straight off disk so they are reachable any
    # hour, even when the dashboard service is stopped (it only runs 09:10-16:05).
    # /reports/report_latest.html = newest day; autoindex lets you browse dates.
    location /reports/ {
        alias /opt/nifty-dashboard/journal/;
        autoindex on;
    }

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 120s;
    }
}
